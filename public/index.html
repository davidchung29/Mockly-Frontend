<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#3BA676" />
  <meta name="description" content="Mockly - AI-Powered Interview Practice Platform with Eye Contact Analysis" />
  <title>Mockly - AI Interview Practice</title>
  
  <!-- TensorFlow.js and FaceMesh for Eye Tracking -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/facemesh@0.0.3/dist/facemesh.js"></script>
  
  <!-- ✅ CRITICAL: MediaPipe Dependencies for Hand Tracking -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils@0.6.1629159505/control_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  
  <!-- Initialize TensorFlow.js backend and check MediaPipe -->
  <script>
    // Configure TensorFlow.js for optimal performance
    if (typeof tf !== 'undefined') {
      tf.ready().then(() => {
        console.log('✅ TensorFlow.js backend initialized:', tf.getBackend());
        console.log('✅ TensorFlow.js version:', tf.version.tfjs);
        
        // Check if FaceMesh is available
        if (typeof facemesh !== 'undefined') {
          console.log('✅ FaceMesh model is available');
        } else {
          console.warn('⚠️ FaceMesh model not loaded');
        }
        
        // Prefer WebGL for better performance, fallback to CPU
        if (tf.getBackend() !== 'webgl') {
          tf.setBackend('webgl').catch(() => {
            console.warn('⚠️ WebGL backend not available, using CPU backend');
          });
        }
      }).catch(err => {
        console.error('❌ TensorFlow.js initialization failed:', err);
      });
    } else {
      console.error('❌ TensorFlow.js not loaded');
    }

    // ✅ Check MediaPipe dependencies
    window.addEventListener('load', () => {
      console.log('🔍 Checking MediaPipe dependencies...');
      
      if (typeof Hands !== 'undefined') {
        console.log('✅ MediaPipe Hands is available');
      } else {
        console.error('❌ MediaPipe Hands not loaded');
      }
      
      if (typeof Camera !== 'undefined') {
        console.log('✅ MediaPipe Camera is available');
      } else {
        console.warn('⚠️ MediaPipe Camera not available (will use manual processing)');
      }
      
      if (typeof drawConnectors !== 'undefined') {
        console.log('✅ MediaPipe Drawing Utils available');
      } else {
        console.warn('⚠️ MediaPipe Drawing Utils not available');
      }
    });
  </script>
</body>
</html>
